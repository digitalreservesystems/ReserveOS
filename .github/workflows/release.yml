name: Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"
      - run: |
          mkdir -p build
          GOOS=linux GOARCH=amd64 go build -o build/reserveos-node-linux-amd64 ./cmd/reserveos-node
          GOOS=windows GOARCH=amd64 go build -o build/reserveos-node-windows-amd64.exe ./cmd/reserveos-node
      - uses: actions/upload-artifact@v4
        with:
          name: reserveos-builds
          path: build/
